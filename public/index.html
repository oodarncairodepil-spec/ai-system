<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AI Sales Agent</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .chat-box {
      width: 100%;
      max-width: 600px;
      height: 80vh;
      background: #111827;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      max-width: 80%;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .bot {
      background: #374151;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #1f2937;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="chat-box">
    <div id="messages" class="messages"></div>

    <div class="input-box">
      <input id="input" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

<script>
async function sendMessage() {
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');

  const text = input.value;
  if (!text) return;

  // user message
  messages.innerHTML += `<div class="msg user">${text}</div>`;
  input.value = '';

  // typing indicator
  const typing = document.createElement('div');
  typing.className = 'msg bot';
  typing.innerText = 'AI is typing...';
  messages.appendChild(typing);

  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.message || data.detail || data.error || 'Request failed');
    }

    // replace typing with real response
    typing.innerHTML = formatResponse(data);

  } catch (err) {
    typing.innerText = 'Error: ' + err.message;
  }

  messages.scrollTop = messages.scrollHeight;
}

// show response + hidden debug
function formatResponse(data) {
  const context = Array.isArray(data.context)
    ? data.context
    : (typeof data.context === 'string' && data.context
      ? [data.context]
      : []);

  const products = context.length
    ? `<div style="font-size:12px;color:#9ca3af;margin-top:6px;">
        Context: ${context.join(', ')}
       </div>`
    : `<div style="font-size:12px;color:#ef4444;margin-top:6px;">
        No matching product
       </div>`;

  return `
    <div>${data.response || 'No response generated.'}</div>
    ${products}
    <details style="margin-top:8px; font-size:12px; color:#9ca3af;">
      <summary>🔍 Debug</summary>
      <pre>${JSON.stringify(data, null, 2)}</pre>
    </details>
  `;
}
</script>

</body>
</html>
